name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc g++

      - name: Compile C sources (c-lang/)
        run: |
          FAIL=0
          find c-lang -name "*.c" | sort | while read f; do
            echo "  CC $f"
            cc -std=c11 -Wall -Wextra -Wpedantic -o /tmp/out "$f" 2>&1 || { echo "FAIL: $f"; FAIL=1; }
          done
          exit $FAIL

      - name: Compile C++ sources (cpp-lang/ sessions 01-20, std=c++17)
        run: |
          FAIL=0
          find cpp-lang -path "*/0[1-9]-*/*.cpp" -o -path "*/1[0-9]-*/*.cpp" -o -path "*/20-*/*.cpp" \
            | sort | while read f; do
            echo "  CXX $f"
            g++ -std=c++17 -Wall -Wextra -Wpedantic -o /tmp/out "$f" 2>&1 || { echo "FAIL: $f"; FAIL=1; }
          done
          exit $FAIL

      - name: Compile C++ sources (cpp-lang/ sessions 21-22, std=c++20)
        run: |
          FAIL=0
          for d in cpp-lang/21-* cpp-lang/22-*; do
            [ -d "$d" ] || continue
            find "$d" -name "*.cpp" | sort | while read f; do
              echo "  CXX(c++20) $f"
              g++ -std=c++20 -Wall -Wextra -Wpedantic -o /tmp/out "$f" 2>&1 || { echo "FAIL: $f"; FAIL=1; }
            done
          done
          exit $FAIL

      - name: Compile C++ sources (cpp-lang/ sessions 23+, std=c++23)
        run: |
          FAIL=0
          for d in cpp-lang/2[3-9]-* cpp-lang/3[0-9]-*; do
            [ -d "$d" ] || continue
            find "$d" -name "*.cpp" | sort | while read f; do
              echo "  CXX(c++23) $f"
              g++ -std=c++23 -Wall -Wextra -Wpedantic -o /tmp/out "$f" 2>&1 || { echo "FAIL: $f"; FAIL=1; }
            done
          done
          exit $FAIL
