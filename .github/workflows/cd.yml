name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        include:
          - app: web-main
            image: ghcr.io/rionchoi/platform-web-main
            port: 3000
          - app: web-admin
            image: ghcr.io/rionchoi/platform-web-admin
            port: 3001
          - app: web-partner
            image: ghcr.io/rionchoi/platform-web-partner
            port: 3002

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=staging

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  update-helm-values:
    name: Update Helm Values (staging)
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Switch to deploy/staging branch
        run: |
          git fetch origin deploy/staging 2>/dev/null && git checkout deploy/staging \
            || git checkout -b deploy/staging

      - name: Update staging image tags
        run: |
          TAG="sha-${{ steps.sha.outputs.short }}"
          for app in web-main web-admin web-partner; do
            yq -i ".image.tag = \"$TAG\"" infra/helm/$app/values-staging.yaml
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/*/values-staging.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(helm): staging → sha-${{ steps.sha.outputs.short }} [skip ci]"
          git push origin deploy/staging
