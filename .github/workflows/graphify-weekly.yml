name: Weekly Graphify Rebuild

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 03:00 UTC (KST 12:00)
  workflow_dispatch:

jobs:
  graphify-rebuild:
    name: Full Graphify Rebuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Graphify full rebuild
        run: npx graphify . --full

      - name: Commit and push
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes@platform.local"
          git add graphify-out/
          git diff --cached --quiet && exit 0
          git commit -m "chore: weekly graphify full rebuild [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Ekko (via Slack/Telegram if configured)
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Graphify rebuild completed: $STATUS"
          # TODO: Add Slack/Telegram webhook here
