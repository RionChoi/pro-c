{{- if and .Values.ingress.enabled .Values.ingress.rateLimit.enabled .Values.ingress.rateLimit.sensitivePaths }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-sensitive
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "{{ .Values.ingress.rateLimit.sensitiveRps }}"
    nginx.ingress.kubernetes.io/limit-connections: "{{ .Values.ingress.rateLimit.sensitiveConnections }}"
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: nginx
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Release.Name }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- range .Values.ingress.rateLimit.sensitivePaths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
{{- end }}
