replicaCount: 1

image:
  tag: dev
  pullPolicy: Always

ingress:
  enabled: true
  host: app.dev.example.com
  tls:
    enabled: false

env:
  NODE_ENV: development
  NEXTAUTH_URL: http://app.dev.example.com

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
