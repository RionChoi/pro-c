# kubeseal로 암호화된 Secret.
# 값 갱신 방법: scripts/seal-secret.sh 참고
# 암호화 전 절대 Git에 평문 값 커밋 금지.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: web-main-secret
  namespace: platform
spec:
  encryptedData:
    # kubeseal --raw --name web-main-secret --namespace platform --from-file /dev/stdin
    AUTH_SECRET: REPLACE_WITH_SEALED_VALUE
    AUTH_GOOGLE_ID: REPLACE_WITH_SEALED_VALUE
    AUTH_GOOGLE_SECRET: REPLACE_WITH_SEALED_VALUE
    DATABASE_URL: REPLACE_WITH_SEALED_VALUE
    KAFKA_BROKERS: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: web-main-secret
      namespace: platform
    type: Opaque
